<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面AI助手</title>
<style>
  :root {
    --pink: #ec4899;
    --blue: #3b82f6;
    --purple: #8b5cf6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a1a;
    overflow: hidden;
    cursor: default;
  }

  /* ── 星空背景 ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: starFloat var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes starFloat {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
    20%, 80% { opacity: var(--op); transform: translateY(-30px) scale(1); }
    50% { opacity: var(--op); transform: translateY(-60px) scale(1.2); }
  }

  /* ── 樱花粒子 ── */
  .petal {
    position: fixed; pointer-events: none; z-index: 1;
    font-size: 20px;
    animation: petalFall var(--dur) var(--delay) linear infinite;
    opacity: 0.6;
    top: -30px;
  }
  @keyframes petalFall {
    0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { transform: translateY(105vh) rotate(720deg) translateX(var(--drift)); opacity: 0; }
  }

  /* ── 主容器 ── */
  .container {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
  }

  /* ── 渐隐光晕 ── */
  .glow-pink, .glow-blue {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    animation: glowPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  .glow-pink { background: var(--pink); left: -100px; top: 50px; animation-delay: 0s; }
  .glow-blue { background: var(--blue); right: -100px; top: 50px; animation-delay: 2s; }
  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.1; }
    50% { transform: scale(1.3); opacity: 0.2; }
  }

  h1 {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
    position: relative;
  }
  h1 .text {
    background: linear-gradient(135deg, #f472b6 0%, #a78bfa 40%, #60a5fa 70%, #f472b6 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 4s ease-in-out infinite;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .subtitle {
    color: #94a3b8;
    font-size: 1.15rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    margin-bottom: 3.5rem;
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid rgba(148,163,184,0.5);
    display: inline-block;
    animation: typing 2s steps(12) 1s both, blink 0.8s step-end infinite;
  }
  @keyframes typing { from { max-width: 0 } to { max-width: 14em } }
  @keyframes blink { 50% { border-color: transparent } }

  .tags {
    display: flex; gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .tags span {
    font-size: 0.75rem;
    padding: 0.3rem 0.7rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #94a3b8;
    transition: all 0.3s;
  }
  .card:hover .tags span {
    background: rgba(255,255,255,0.1);
    color: #cbd5e1;
  }

  /* ── 卡片 ── */
  .cards {
    display: flex; gap: 2.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    width: 320px;
    text-decoration: none;
    color: #fff;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 3rem 2rem 2rem;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 2px;
    background: linear-gradient(135deg, transparent 30%, var(--accent) 50%, transparent 70%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .card:hover::before { opacity: 1; }
  .card:hover {
    transform: translateY(-8px);
    border-color: var(--accent);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px var(--glow);
  }
  .card.girl { --accent: var(--pink); --glow: rgba(236,72,153,0.15); }
  .card.boy { --accent: var(--blue); --glow: rgba(59,130,246,0.15); }

  /* 卡片内光点 */
  .card .sparkle {
    position: absolute; width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    animation: sparkle 3s ease-in-out infinite;
    opacity: 0;
  }
  .card:hover .sparkle { animation-play-state: running; }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }

  .card .icon-wrap {
    width: 90px; height: 90px;
    margin: 0 auto 1.5rem;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem;
    position: relative;
    box-shadow: 0 0 40px var(--glow);
    transition: transform 0.3s;
  }
  .card:hover .icon-wrap { transform: scale(1.1) rotate(-5deg); }
  .card .icon-wrap::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0.3;
    animation: ringPulse 2s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.2; }
    50% { transform: scale(1.15); opacity: 0.5; }
  }

  .card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.6rem; }
  .card .desc { color: #94a3b8; font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.8rem; }

  .card .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 2rem;
    border-radius: 50px;
    font-size: 0.95rem; font-weight: 600;
    color: #fff;
    transition: all 0.3s;
    background: var(--accent);
    box-shadow: 0 4px 20px var(--glow);
  }
  .card .btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px var(--glow); }
  .card .btn .arrow { transition: transform 0.3s; display: inline-block; }
  .card .btn:hover .arrow { transform: translateX(4px); }

  /* ── 底部 ── */
  .footer {
    margin-top: 3.5rem;
    display: flex; gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .footer a {
    color: #64748b; text-decoration: none;
    font-size: 0.9rem;
    padding: 0.5rem 1.2rem;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s;
    display: inline-flex; align-items: center; gap: 0.4rem;
  }
  .footer a:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
  }

  @media (max-width: 720px) {
    h1 { font-size: 2rem; }
    .cards { gap: 1.5rem; }
    .card { width: 100%; max-width: 320px; padding: 2rem 1.5rem; }
  }
</style>
</head>

<script>
// ── 生成星空 ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {

  s.className = 'star';

</script>
